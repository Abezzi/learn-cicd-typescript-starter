name: cd

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Google Cloud Authentication using JSON secret
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      # Docker
      - name: Build and Push Docker Image
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-496514/notely-ar-repo/notely:latest \
            --service-account=projects/notely-496514/serviceAccounts/cloud-run-deployer@notely-496514.iam.gserviceaccount.com \
            --default-buckets-behavior=regional-user-owned-bucket \
            .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-496514/notely-ar-repo/notely@sha256:db534a75ff466b9e0331b1c91633a34d39ac292d28af6419f0eac17ca95813ff --region us-central1 --allow-unauthenticated --project notely-496514 --max-instances=4
